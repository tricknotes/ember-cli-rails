name: "CI Tests"

on:
  push:
    branches:
      - main
  pull_request:
    branches: "*"

jobs:
  build:
    runs-on: "ubuntu-latest"

    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.3", "3.4", "4.0"]
        rails: ["7.2", "8.0", "8.1"]
        include:
          - ruby: "4.0"
            rails: "main"

    env:
      RAILS_ENV: "test"
      RAILS_VERSION: "${{ matrix.rails }}"

    steps:
    - uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1

    - name: "Install NodeJS"
      uses: "actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020" # v4.4.0
      with:
        node-version: "20.x"

    - name: "Cache Ember app"
      uses: "actions/cache@5a3ec84eff668545956fd18022155c47e93e2684" # v4.2.3
      with:
        path: "spec/dummy/my-app"
        key: "${{ runner.os }}-ember-app-${{ hashFiles('bin/setup_ember') }}"

    - name: "Install Ruby ${{ matrix.ruby }}"
      uses: "ruby/setup-ruby@3ff19f5e2baf30647122352b96108b1fbe250c64" # v1.299.0
      with:
        ruby-version: "${{ matrix.ruby }}"
        bundler-cache: true

    - name: "Run Setup"
      run: |
        bin/setup

    - name: "Run Tests"
      run: |
        bin/rake
